changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot
  categories:
    - title: "Features"
      labels:
        - enhancement
        - feature
    - title: "Performance"
      labels:
        - perf
        - performance
    - title: "Bug Fixes"
      labels:
        - bug
        - fix
    - title: "Tasks and Refactoring"
      labels:
        - chore
        - refactor
